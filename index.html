<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chasing Bogeys — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green-deep: #1a3a2a; --green-mid: #2d5a3d; --green-bright: #4a8c5c;
  --green-light: #a8d5b5; --cream: #f5f0e8; --cream-dark: #e8e0d0;
  --gold: #c8952a; --gold-light: #e8b84b; --white: #fefefe;
  --text-muted: #7a7a72; --red: #c0392b;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
}

html, body {
  height: 100%; font-family: var(--sans);
  background: var(--green-deep); color: var(--cream);
  overflow: hidden;
}

/* Background texture */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(45,90,61,0.6) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 30%, rgba(26,58,42,0.8) 0%, transparent 50%);
}

/* Decorative circles */
body::after {
  content: '';
  position: fixed;
  width: 600px; height: 600px;
  border: 1px solid rgba(200,149,42,0.08);
  border-radius: 50%;
  bottom: -200px; right: -150px;
  z-index: 0;
}

.page {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem;
}

/* Logo */
.logo {
  font-family: var(--serif);
  font-size: 2rem;
  color: var(--cream);
  margin-bottom: 0.5rem;
  letter-spacing: 0.01em;
}
.logo em { color: var(--gold-light); font-style: italic; }

.tagline {
  font-size: 0.78rem;
  font-weight: 300;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--green-light);
  margin-bottom: 3rem;
}

/* Card */
.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(200,149,42,0.2);
  border-radius: 12px;
  padding: 2.5rem 2.75rem;
  width: 100%;
  max-width: 400px;
  text-align: center;
  backdrop-filter: blur(4px);
}

.card-icon {
  width: 52px; height: 52px;
  background: rgba(200,149,42,0.15);
  border: 1px solid rgba(200,149,42,0.3);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1.5rem;
  font-size: 1.4rem;
}

.card-title {
  font-family: var(--serif);
  font-size: 1.5rem;
  color: var(--cream);
  margin-bottom: 0.5rem;
}

.card-sub {
  font-size: 0.85rem;
  font-weight: 300;
  color: var(--green-light);
  line-height: 1.65;
  margin-bottom: 2rem;
}

/* Input */
.input-wrap { position: relative; margin-bottom: 1rem; }

.pw-input {
  width: 100%;
  padding: 0.85rem 3rem 0.85rem 1.1rem;
  font-family: var(--sans);
  font-size: 1rem;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(200,149,42,0.25);
  border-radius: 8px;
  color: var(--cream);
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  letter-spacing: 0.1em;
  text-align: center;
}
.pw-input::placeholder {
  color: rgba(168,213,181,0.4);
  letter-spacing: 0.05em;
}
.pw-input:focus {
  border-color: var(--gold);
  background: rgba(255,255,255,0.1);
}
.pw-input.error {
  border-color: var(--red);
  animation: shake 0.3s ease;
}
@keyframes shake {
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-6px)}
  75%{transform:translateX(6px)}
}

/* Toggle visibility button */
.toggle-vis {
  position: absolute; right: 0.85rem; top: 50%;
  transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: rgba(168,213,181,0.5);
  font-size: 1rem; line-height: 1;
  padding: 0.25rem;
  transition: color 0.2s;
}
.toggle-vis:hover { color: var(--green-light); }

/* Error message */
.error-msg {
  font-size: 0.78rem;
  color: #e57373;
  margin-bottom: 1rem;
  min-height: 1.2em;
  opacity: 0;
  transition: opacity 0.2s;
}
.error-msg.visible { opacity: 1; }

/* Submit button */
.btn-enter {
  width: 100%;
  padding: 0.9rem;
  background: var(--gold);
  color: var(--green-deep);
  border: none;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: background 0.18s, transform 0.15s;
}
.btn-enter:hover { background: var(--gold-light); transform: translateY(-1px); }
.btn-enter:active { transform: translateY(0); }

/* Footer note */
.footer-note {
  margin-top: 2.5rem;
  font-size: 0.72rem;
  font-weight: 300;
  color: rgba(168,213,181,0.4);
  letter-spacing: 0.04em;
}

@media (max-width: 480px) {
  .card { padding: 2rem 1.5rem; }
  .logo { font-size: 1.6rem; }
}
</style>
</head>
<body>

<div class="page">

  <div class="logo">Chasing <em>Bogeys</em></div>
  <div class="tagline">Golf tools for the rest of us</div>

  <div class="card">
    <div class="card-icon">⛳</div>
    <h1 class="card-title">Early Access</h1>
    <p class="card-sub">This site is currently in development. Enter the password to take a look around.</p>

    <div class="input-wrap">
      <input
        class="pw-input"
        id="pw"
        type="password"
        placeholder="Password"
        autocomplete="off"
        onkeydown="if(event.key==='Enter')checkPW()"
        oninput="clearError()"
      >
      <button class="toggle-vis" onclick="toggleVis()" tabindex="-1" aria-label="Show/hide password">👁</button>
    </div>

    <div class="error-msg" id="error-msg">Incorrect password — try again.</div>

    <button class="btn-enter" onclick="checkPW()">Enter Site →</button>
  </div>

  <div class="footer-note">chasingbogeys.com</div>

</div>

<script>
// Password is hashed so it's not readable in plain source
// SHA-256 of "Lenny"
const HASH = 'f59487f42b4b71316ea9af4f6eb1b7741cad0e84b7e74e9cba0c07f9ad22a5a4';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function checkPW() {
  const val = document.getElementById('pw').value;
  if (!val) return;
  const hash = await sha256(val);
  if (hash === HASH) {
    // Set a session flag and redirect
    sessionStorage.setItem('cb_auth', '1');
    window.location.href = 'home.html';
  } else {
    const inp = document.getElementById('pw');
    const err = document.getElementById('error-msg');
    inp.classList.add('error');
    err.classList.add('visible');
    inp.value = '';
    inp.focus();
    setTimeout(() => inp.classList.remove('error'), 400);
  }
}

function clearError() {
  document.getElementById('error-msg').classList.remove('visible');
}

function toggleVis() {
  const inp = document.getElementById('pw');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
